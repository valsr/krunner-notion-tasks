name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            cmake gcc make git \
            extra-cmake-modules \
            qt6-base \
            krunner kcmutils ki18n knotifications

      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel

      - name: Install to staging dir
        run: DESTDIR=pkg cmake --install build

      - name: Smoke test
        run: test -f pkg/usr/lib/qt6/plugins/kf6/krunner/krunner_notion_tasks.so

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg
          path: pkg/
          retention-days: 7

  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: pkg
          path: pkg

      - name: Build binary tarball
        run: tar czf "krunner-notion-tasks-${GITHUB_REF_NAME}.tar.gz" -C pkg .

      - name: Build source tarball
        run: |
          git archive --format=tar.gz \
            --prefix="krunner-notion-tasks-${GITHUB_REF_NAME}/" \
            -o "krunner-notion-tasks-${GITHUB_REF_NAME}-src.tar.gz" HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            krunner-notion-tasks-${{ github.ref_name }}.tar.gz
            krunner-notion-tasks-${{ github.ref_name }}-src.tar.gz
